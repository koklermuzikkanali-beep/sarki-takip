<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Defter · Borç & Gelir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF8F3;
    --paper-2:#F3F0E8;
    --ink:#22201B;
    --debt:#A8432B;
    --debt-soft:#F3E3DD;
    --credit:#3D6B4F;
    --credit-soft:#E3ECE4;
    --line:#DEDAD0;
    --muted:#8C8577;
    --gold:#B8873A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--paper-2);}
  body{
    font-family:'JetBrains Mono',monospace;
    color:var(--ink);
    min-height:100vh;
    display:flex; justify-content:center;
  }
  .app{
    width:100%; max-width:480px;
    background:var(--paper);
    min-height:100vh;
    position:relative;
    box-shadow:0 0 40px rgba(0,0,0,0.04);
  }
  .app::before{
    content:"";
    display:block;
    height:6px;
    background-image:linear-gradient(135deg, var(--paper-2) 25%, transparent 25%),
                      linear-gradient(225deg, var(--paper-2) 25%, transparent 25%);
    background-size:12px 12px;
    background-position:0 0;
  }
  header{
    padding:28px 24px 20px;
    border-bottom:1px solid var(--line);
  }
  .header-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .eyebrow{
    font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted); margin-bottom:6px;
  }
  .gear{
    border:1px solid var(--line); background:var(--paper-2); color:var(--muted);
    width:32px; height:32px; border-radius:50%; font-size:14px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  h1{
    font-family:'Fraunces',serif; font-weight:500; font-style:italic;
    font-size:28px; margin:0 0 20px; letter-spacing:-.01em;
  }
  .balance-card{
    background:var(--ink); color:var(--paper);
    border-radius:14px; padding:18px 20px;
    display:flex; justify-content:space-between; align-items:flex-end;
  }
  .balance-label{ font-size:11px; letter-spacing:.1em; text-transform:uppercase; opacity:.65;}
  .balance-value{ font-family:'Fraunces',serif; font-size:30px; font-weight:500; margin-top:4px;}
  .balance-value.debt{ color:#E8A594; }
  .balance-value.credit{ color:#A8D4B4; }
  .balance-fx{ font-size:12px; opacity:.6; margin-top:2px; }
  .balance-sub{ text-align:right; font-size:11px; opacity:.7; line-height:1.6;}

  .tabs{
    display:flex; gap:4px; padding:14px 24px 0;
    overflow-x:auto; scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:none; font-family:'JetBrains Mono',monospace; font-size:11px;
    letter-spacing:.05em; text-transform:uppercase;
    padding:7px 13px; border-radius:20px; border:1px solid var(--line);
    background:transparent; color:var(--muted); cursor:pointer;
    white-space:nowrap;
  }
  .tab.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }

  .list{ padding:10px 24px 100px; }
  .empty{
    text-align:center; padding:60px 20px; color:var(--muted);
  }
  .empty .glyph{ font-family:'Fraunces',serif; font-style:italic; font-size:22px; color:var(--ink); margin-bottom:8px;}
  .empty p{ font-size:12px; line-height:1.7; margin:0;}

  .entry{
    padding:16px 0; border-bottom:1px solid var(--line);
    display:flex; flex-direction:column; gap:8px;
  }
  .entry-top{ display:flex; justify-content:space-between; align-items:baseline; gap:10px;}
  .entry-name{
    font-family:'Fraunces',serif; font-size:17px; font-weight:500;
    flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .leader{
    flex:1; border-bottom:1px dotted var(--line); margin:0 8px 4px;
    min-width:16px;
  }
  .amount-block{ text-align:right; white-space:nowrap; }
  .entry-amount{ font-size:16px; font-weight:600; }
  .entry-amount.debt{ color:var(--debt); }
  .entry-amount.credit{ color:var(--credit); }
  .entry-fx{ font-size:10.5px; color:var(--muted); margin-top:1px; }
  .entry-meta{ display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .entry-info{ font-size:11px; color:var(--muted); display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .badge{
    font-size:10px; letter-spacing:.04em; text-transform:uppercase;
    padding:3px 8px; border-radius:20px;
  }
  .badge.debt{ background:var(--debt-soft); color:var(--debt); }
  .badge.credit{ background:var(--credit-soft); color:var(--credit); }
  .badge.paid{ background:var(--paper-2); color:var(--muted); text-decoration:line-through;}
  .badge.overdue{ background:#FBEADB; color:var(--gold); }
  .entry-actions{ display:flex; gap:6px;}
  .icon-btn{
    border:none; background:var(--paper-2); color:var(--ink);
    width:26px; height:26px; border-radius:50%; font-size:13px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .entry.is-paid .entry-name, .entry.is-paid .entry-amount{ opacity:.4; }

  .fab{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px;
    padding:16px 24px 22px;
    background:linear-gradient(to top, var(--paper) 60%, transparent);
    display:flex; justify-content:center;
  }
  .fab button{
    font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase;
    background:var(--ink); color:var(--paper); border:none;
    padding:14px 28px; border-radius:30px; cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,.18);
  }

  .sheet-overlay{
    position:fixed; inset:0; background:rgba(34,32,27,.4);
    display:none; align-items:flex-end; justify-content:center; z-index:10;
  }
  .sheet-overlay.open{ display:flex; }
  .sheet{
    width:100%; max-width:480px; background:var(--paper);
    border-radius:20px 20px 0 0; padding:22px 24px 28px;
    max-height:88vh; overflow-y:auto;
  }
  .sheet h2{ font-family:'Fraunces',serif; font-weight:500; font-style:italic; font-size:21px; margin:0 0 18px;}
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:6px;}
  .field input, .field textarea, .field select{
    width:100%; font-family:'JetBrains Mono',monospace; font-size:14px;
    padding:11px 12px; border:1px solid var(--line); border-radius:8px;
    background:var(--paper-2); color:var(--ink);
  }
  .field textarea{ resize:none; min-height:50px; }
  .type-toggle{ display:flex; gap:8px; }
  .type-toggle button{
    flex:1; padding:12px; border-radius:8px; border:1px solid var(--line);
    background:var(--paper-2); font-family:'JetBrains Mono',monospace; font-size:12px;
    letter-spacing:.05em; text-transform:uppercase; cursor:pointer; color:var(--muted);
  }
  .type-toggle button.sel.debt{ background:var(--debt-soft); color:var(--debt); border-color:var(--debt); }
  .type-toggle button.sel.credit{ background:var(--credit-soft); color:var(--credit); border-color:var(--credit); }
  .sheet-actions{ display:flex; gap:10px; margin-top:18px; }
  .sheet-actions button{
    flex:1; padding:14px; border-radius:10px; border:none; cursor:pointer;
    font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.06em; text-transform:uppercase;
  }
  .btn-cancel{ background:var(--paper-2); color:var(--muted); }
  .btn-save{ background:var(--ink); color:var(--paper); }
  .rate-row{ display:flex; gap:8px; align-items:flex-end; }
  .rate-row .field{ flex:1; margin-bottom:0; }
  .btn-fetch{
    padding:11px 14px; border-radius:8px; border:1px solid var(--line);
    background:var(--paper-2); font-family:'JetBrains Mono',monospace; font-size:11px;
    letter-spacing:.03em; text-transform:uppercase; cursor:pointer; color:var(--ink); white-space:nowrap;
  }
  .rate-status{ font-size:10.5px; color:var(--muted); margin-top:8px; line-height:1.5; }
  .rate-status.err{ color:var(--debt); }
  .rate-status.ok{ color:var(--credit); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-top">
      <div>
        <div class="eyebrow" id="today"></div>
        <h1>Defter</h1>
      </div>
      <button class="gear" id="openSettings" title="Döviz ayarları">⚙</button>
    </div>
    <div class="balance-card">
      <div>
        <div class="balance-label">Net Durum</div>
        <div class="balance-value" id="netValue">₺0</div>
        <div class="balance-fx" id="netValueFx"></div>
      </div>
      <div class="balance-sub" id="netSub">gelir yok · borç yok</div>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-filter="all">Tümü</button>
    <button class="tab" data-filter="debt">Borçlarım</button>
    <button class="tab" data-filter="credit">Gelir</button>
    <button class="tab" data-filter="pending">Bekleyen</button>
  </div>

  <div class="list" id="list"></div>

  <div class="fab">
    <button id="openAdd">+ Yeni Kayıt</button>
  </div>
</div>

<div class="sheet-overlay" id="overlay">
  <div class="sheet">
    <h2 id="sheetTitle">Yeni Kayıt</h2>
    <div class="type-toggle">
      <button type="button" class="sel debt" id="btnDebt">Borcum</button>
      <button type="button" id="btnCredit">Gelir</button>
    </div>
    <div class="field" style="margin-top:14px;">
      <label>Kişi / Kurum</label>
      <input type="text" id="fName" placeholder="örn. Ahmet, Kredi Kartı, Spotify...">
    </div>
    <div class="field">
      <label>Tutar (₺)</label>
      <input type="number" id="fAmount" inputmode="decimal" placeholder="0">
    </div>
    <div class="field">
      <label>Tarih</label>
      <input type="date" id="fDate">
    </div>
    <div class="field">
      <label>Vade / Son Ödeme (opsiyonel)</label>
      <input type="date" id="fDue">
    </div>
    <div class="field">
      <label>Not (opsiyonel)</label>
      <textarea id="fNote" placeholder="ek bilgi..."></textarea>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" id="btnCancel">Vazgeç</button>
      <button class="btn-save" id="btnSave">Kaydet</button>
    </div>
  </div>
</div>

<div class="sheet-overlay" id="settingsOverlay">
  <div class="sheet">
    <h2>Dolar Kuru</h2>
    <div class="rate-row">
      <div class="field">
        <label>1 USD = kaç ₺</label>
        <input type="number" id="fRate" inputmode="decimal" placeholder="örn. 33.20" step="0.01">
      </div>
      <button class="btn-fetch" id="btnFetchRate">Otomatik Çek</button>
    </div>
    <div class="rate-status" id="rateStatus">Kur girilmedi.</div>
    <div class="sheet-actions">
      <button class="btn-cancel" id="btnSettingsCancel">Kapat</button>
      <button class="btn-save" id="btnSettingsSave">Uygula</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'borc-alacak-defteri';
const FX_KEY = 'borc-alacak-defteri-kur';
let entries = [];
let currentFilter = 'all';
let selectedType = 'debt';
let fx = { currency:'USD', rate:null, updatedAt:null, auto:false };

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : [];
  }catch(e){ entries = []; }
  try{
    const rawFx = localStorage.getItem(FX_KEY);
    if(rawFx) fx = JSON.parse(rawFx);
  }catch(e){}
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
function saveFx(){ localStorage.setItem(FX_KEY, JSON.stringify(fx)); }

function fmtMoney(n){
  return '₺' + Number(n).toLocaleString('tr-TR', {maximumFractionDigits:0});
}
function fmtFx(tryAmount){
  if(!fx.rate || fx.rate<=0) return '';
  const val = tryAmount / fx.rate;
  return '$' + val.toLocaleString('tr-TR', {maximumFractionDigits:2});
}
function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('tr-TR', {day:'2-digit', month:'short'});
}
function isOverdue(e){
  if(!e.due || e.paid) return false;
  return new Date(e.due+'T00:00:00') < new Date(new Date().toDateString());
}

function renderHeader(){
  const today = new Date();
  document.getElementById('today').textContent = today.toLocaleDateString('tr-TR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

  let debtTotal = 0, creditTotal = 0;
  entries.filter(e=>!e.paid).forEach(e=>{
    if(e.type==='debt') debtTotal += Number(e.amount);
    else creditTotal += Number(e.amount);
  });
  const net = creditTotal - debtTotal;
  const netEl = document.getElementById('netValue');
  netEl.textContent = fmtMoney(Math.abs(net));
  netEl.className = 'balance-value ' + (net >= 0 ? 'credit' : 'debt');

  const fxEl = document.getElementById('netValueFx');
  const fxVal = fmtFx(Math.abs(net));
  fxEl.textContent = fxVal ? '≈ ' + fxVal : '';

  document.getElementById('netSub').innerHTML =
    `gelir ${fmtMoney(creditTotal)}<br>borç ${fmtMoney(debtTotal)}`;
}

function renderList(){
  const list = document.getElementById('list');
  let filtered = entries;
  if(currentFilter==='debt') filtered = entries.filter(e=>e.type==='debt');
  else if(currentFilter==='credit') filtered = entries.filter(e=>e.type==='credit');
  else if(currentFilter==='pending') filtered = entries.filter(e=>!e.paid);
  else if(currentFilter==='paid') filtered = entries.filter(e=>e.paid);

  filtered = [...filtered].sort((a,b)=> new Date(b.date) - new Date(a.date));

  if(filtered.length===0){
    list.innerHTML = `<div class="empty"><div class="glyph">boş sayfa</div><p>Henüz kayıt yok.<br>Aşağıdaki düğmeyle ilk borç ya da geliri ekle.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(e=>{
    const overdue = isOverdue(e);
    let badge = e.paid
      ? '<span class="badge paid">kapandı</span>'
      : overdue
        ? '<span class="badge overdue">vadesi geçti</span>'
        : `<span class="badge ${e.type}">${e.type==='debt'?'borç':'gelir'}</span>`;
    const fxTxt = fmtFx(e.amount);
    return `
    <div class="entry ${e.paid?'is-paid':''}" data-id="${e.id}">
      <div class="entry-top">
        <div class="entry-name">${escapeHtml(e.name)}</div>
        <div class="leader"></div>
        <div class="amount-block">
          <div class="entry-amount ${e.type}">${fmtMoney(e.amount)}</div>
          ${fxTxt ? `<div class="entry-fx">≈ ${fxTxt}</div>` : ''}
        </div>
      </div>
      <div class="entry-meta">
        <div class="entry-info">
          ${badge}
          <span>${fmtDate(e.date)}</span>
          ${e.due ? `<span>· vade ${fmtDate(e.due)}</span>` : ''}
        </div>
        <div class="entry-actions">
          <button class="icon-btn" onclick="togglePaid('${e.id}')" title="Ödendi/Bekliyor">${e.paid ? '↺' : '✓'}</button>
          <button class="icon-btn" onclick="removeEntry('${e.id}')" title="Sil">×</button>
        </div>
      </div>
      ${e.note ? `<div style="font-size:11px;color:var(--muted);">${escapeHtml(e.note)}</div>` : ''}
    </div>`;
  }).join('');
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render(){ renderHeader(); renderList(); }

function togglePaid(id){
  const e = entries.find(x=>x.id===id);
  if(e){ e.paid = !e.paid; save(); render(); }
}
function removeEntry(id){
  entries = entries.filter(x=>x.id!==id);
  save(); render();
}

document.getElementById('tabs').addEventListener('click', (ev)=>{
  const btn = ev.target.closest('.tab');
  if(!btn) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderList();
});

const overlay = document.getElementById('overlay');
document.getElementById('openAdd').addEventListener('click', ()=>{
  document.getElementById('fName').value='';
  document.getElementById('fAmount').value='';
  document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('fDue').value='';
  document.getElementById('fNote').value='';
  selectedType='debt';
  updateTypeButtons();
  overlay.classList.add('open');
});
document.getElementById('btnCancel').addEventListener('click', ()=> overlay.classList.remove('open'));
overlay.addEventListener('click', (ev)=>{ if(ev.target===overlay) overlay.classList.remove('open'); });

document.getElementById('btnDebt').addEventListener('click', ()=>{ selectedType='debt'; updateTypeButtons(); });
document.getElementById('btnCredit').addEventListener('click', ()=>{ selectedType='credit'; updateTypeButtons(); });
function updateTypeButtons(){
  const bd = document.getElementById('btnDebt');
  const bc = document.getElementById('btnCredit');
  bd.classList.toggle('sel', selectedType==='debt');
  bd.classList.toggle('debt', selectedType==='debt');
  bc.classList.toggle('sel', selectedType==='credit');
  bc.classList.toggle('credit', selectedType==='credit');
}

document.getElementById('btnSave').addEventListener('click', ()=>{
  const name = document.getElementById('fName').value.trim();
  const amount = parseFloat(document.getElementById('fAmount').value);
  const date = document.getElementById('fDate').value || new Date().toISOString().slice(0,10);
  const due = document.getElementById('fDue').value;
  const note = document.getElementById('fNote').value.trim();
  if(!name || !amount || amount<=0){
    alert('Kişi adı ve geçerli bir tutar gir.');
    return;
  }
  entries.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    type: selectedType, name, amount, date, due, note, paid:false
  });
  save();
  overlay.classList.remove('open');
  render();
});

/* --- Döviz ayarları --- */
const settingsOverlay = document.getElementById('settingsOverlay');
document.getElementById('openSettings').addEventListener('click', ()=>{
  document.getElementById('fRate').value = fx.rate || '';
  updateRateStatus();
  settingsOverlay.classList.add('open');
});
document.getElementById('btnSettingsCancel').addEventListener('click', ()=> settingsOverlay.classList.remove('open'));
settingsOverlay.addEventListener('click', (ev)=>{ if(ev.target===settingsOverlay) settingsOverlay.classList.remove('open'); });

document.getElementById('btnSettingsSave').addEventListener('click', ()=>{
  const rateVal = parseFloat(document.getElementById('fRate').value);
  fx.rate = (rateVal && rateVal>0) ? rateVal : null;
  saveFx();
  settingsOverlay.classList.remove('open');
  render();
});

document.getElementById('btnFetchRate').addEventListener('click', async ()=>{
  const statusEl = document.getElementById('rateStatus');
  statusEl.textContent = 'Kur alınıyor...';
  statusEl.className = 'rate-status';
  try{
    const res = await fetch(`https://api.frankfurter.app/latest?amount=1&from=USD&to=TRY`);
    if(!res.ok) throw new Error('İstek başarısız');
    const data = await res.json();
    const rate = data.rates && data.rates.TRY;
    if(!rate) throw new Error('Kur bulunamadı');
    document.getElementById('fRate').value = rate.toFixed(4);
    fx.auto = true;
    fx.updatedAt = new Date().toISOString();
    statusEl.textContent = `Otomatik alındı: 1 USD = ${rate.toFixed(2)} ₺`;
    statusEl.className = 'rate-status ok';
  }catch(err){
    fx.auto = false;
    statusEl.textContent = 'Otomatik kur alınamadı (bağlantı engellenmiş olabilir). Yukarıdaki kutuya kuru elle gir.';
    statusEl.className = 'rate-status err';
  }
});

function updateRateStatus(){
  const statusEl = document.getElementById('rateStatus');
  if(fx.rate){
    const when = fx.updatedAt ? new Date(fx.updatedAt).toLocaleString('tr-TR', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : null;
    statusEl.textContent = fx.auto && when
      ? `Son otomatik güncelleme: ${when}`
      : 'Manuel girilen kur kullanılıyor.';
    statusEl.className = 'rate-status';
  } else {
    statusEl.textContent = 'Kur girilmedi. "Otomatik Çek" dene ya da elle gir.';
    statusEl.className = 'rate-status';
  }
}

load();
render();
</script>
</body>
</html>
