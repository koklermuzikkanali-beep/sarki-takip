<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Kalan Takip" />
<meta name="theme-color" content="#F6F1E6" />
<title>Kalan Takip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F6F1E6;
    --surface: #FFFDF8;
    --ink: #2A231C;
    --ink-soft: #7A6C5C;
    --line: #E4D9C4;
    --accent: #8C5A3C;
    --good: #4F7858;
    --good-soft: #E7EEE3;
    --warn: #A85C3A;
    --warn-soft: #F3E3D8;
    --chipA-bg: #EFE6D4;
    --chipA-text: #7C6640;
    --chipB-bg: #E2E7DC;
    --chipB-text: #5C6B50;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--paper); }
  body {
    margin: 0;
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    padding-bottom: max(50px, env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 560px; margin: 0 auto; padding: 32px 18px 40px; }

  h1 { font-size: 26px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; }
  .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 22px;
  }

  .quick-card {
    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 22px;
  }
  .quick-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .quick-caption { font-size: 12px; color: var(--ink-soft); line-height: 1.4; margin-bottom: 16px; }
  .quick-result { margin-top: 4px; }
  .quick-result-row {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    border-bottom: 1px solid var(--line);
  }
  .quick-result-row:last-child { border-bottom: none; }
  .quick-result-row .qr-name { color: var(--ink-soft); }
  .quick-result-row .qr-val { font-weight: 600; color: var(--ink); }
  .quick-result-empty { font-size: 12px; color: var(--ink-soft); padding-top: 4px; }

  .balance-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 22px;
  }
  .balance-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
  .balance-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--ink-soft);
  }
  .balance-value { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; color: var(--accent); }
  .balance-actions { display: flex; gap: 10px; }
  .balance-actions button.secondary { width: auto; flex: 1; }
  .withdraw-list { margin-top: 4px; }
  .withdraw-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-top: 1px solid var(--line);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
  }
  .withdraw-date { color: var(--ink-soft); }
  .withdraw-amount { color: var(--warn); font-weight: 600; flex: 1; text-align: right; margin-right: 10px; }
  .withdraw-del { background: none; border: none; color: var(--ink-soft); font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1; }

  .tab-bar {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin-bottom: 24px;
    padding-bottom: 2px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    max-width: 130px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 9px 15px;
    border-radius: 20px;
    border: 1.5px solid var(--line);
    background: var(--surface);
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
  }
  .tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .tab-add {
    flex: 0 0 auto;
    width: 38px;
    min-width: 38px;
    max-width: 38px;
    padding: 9px 0;
    text-align: center;
    font-weight: 700;
    font-size: 16px;
  }

  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 7px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  input[type=number], input[type=date], input[type=text] {
    width: 100%;
    padding: 14px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    background: var(--surface);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    -webkit-appearance: none;
  }
  input:focus { outline: none; border-color: var(--accent); }

  button.primary {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 10px;
    background: var(--ink);
    color: var(--paper);
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  button.primary:active { opacity: .85; }

  button.secondary {
    width: 100%;
    padding: 13px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    background: transparent;
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: .04em;
    text-transform: uppercase;
    cursor: pointer;
  }
  button.secondary.danger { color: var(--warn); border-color: var(--warn-soft); }

  .plan-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 22px; }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 18px;
  }
  .done-banner {
    background: var(--good);
    color: var(--surface);
    border-radius: 9px;
    padding: 11px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    text-align: center;
    margin-bottom: 16px;
  }
  .summary-rows { display: flex; flex-direction: column; }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
  }
  .summary-rows .summary-row:last-child { border-bottom: none; }
  .summary-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .summary-value { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; }
  .summary-value.big { font-size: 20px; color: var(--accent); }

  .progress-wrap { margin-top: 16px; }
  .progress-labels { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .progress-labels span { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft); }
  .progress-track { height: 7px; background: var(--line); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .3s ease; }

  .legend { display: flex; gap: 10px; margin-bottom: 20px; }
  .legend-item { flex: 1; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 12px 13px; }
  .legend-title {
    display: flex;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--ink);
    font-weight: 600;
    margin-bottom: 5px;
  }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .legend-desc { font-size: 12.5px; color: var(--ink-soft); line-height: 1.45; }

  .day-row {
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .day-row.met { border-color: var(--good); }
  .day-row.under { border-color: var(--warn); }
  .day-row.today { box-shadow: 0 0 0 2px var(--accent) inset; }

  .day-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 11px; }
  .day-num { font-weight: 600; font-size: 15px; }
  .day-date { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--ink-soft); }

  .day-input-row { margin-bottom: 11px; }
  .day-input-row input {
    width: 100%;
    padding: 11px 12px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    background: var(--paper);
    color: var(--ink);
  }

  .chip-remaining { margin-top: 8px; display: flex; justify-content: space-between; align-items: baseline; }
  .chip-remaining-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--ink-soft);
  }
  .chip-remaining-value { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: var(--accent); }

  .day-targets { display: flex; gap: 8px; }
  .target-chip { flex: 1; border-radius: 8px; padding: 8px 10px; background: var(--chipA-bg); }
  .target-chip.b { background: var(--chipB-bg); }
  .target-chip-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--chipA-text);
  }
  .target-chip.b .target-chip-label { color: var(--chipB-text); }
  .target-chip-value { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; margin-top: 3px; color: var(--ink); }
  .surplus-note { font-size: 10px; color: var(--good); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>
<div class="wrap">

  <h1>Kalan Takip</h1>
  <div class="sub">Günlük kazanç hedefi planlayıcı</div>

  <div class="quick-card" id="quickCard" style="display:none;">
    <div class="quick-title">Günlük Kazanç Girişi</div>
    <div class="quick-caption">Girdiğin tutar, bu tarihi kapsayan tüm planlara otomatik yazılır.</div>
    <div class="field">
      <label for="quickDate">Tarih</label>
      <input type="date" id="quickDate">
    </div>
    <div class="field">
      <label for="quickAmount">Kazanç (₺)</label>
      <input type="number" id="quickAmount" inputmode="decimal" step="0.01" placeholder="0">
    </div>
    <button class="primary" id="quickSaveBtn">Tüm Planlara Yaz</button>
    <div class="quick-result" id="quickResult"></div>
  </div>

  <div class="balance-card" id="balanceCard" style="display:none;">
    <div class="balance-header">
      <span class="balance-label">Bakiye</span>
      <span class="balance-value" id="balanceValue">0,00 ₺</span>
    </div>
    <div class="balance-actions">
      <button class="secondary" id="setStartBtn">Başlangıç Bakiyesi</button>
      <button class="secondary" id="withdrawBtn">Para Çek</button>
    </div>
    <div class="withdraw-list" id="withdrawList"></div>
  </div>

  <div class="tab-bar" id="tabBar"></div>

  <div id="setupScreen">
    <div class="field">
      <label for="planName">Plan Adı (opsiyonel)</label>
      <input type="text" id="planName" placeholder="Hedef 1">
    </div>
    <div class="field">
      <label for="goalAmount">Hedef Tutar (₺)</label>
      <input type="number" id="goalAmount" inputmode="decimal" step="0.01" placeholder="12000">
    </div>
    <div class="field">
      <label for="goalDays">Gün Sayısı</label>
      <input type="number" id="goalDays" inputmode="numeric" step="1" placeholder="30">
    </div>
    <div class="field">
      <label for="startDate">Başlangıç Tarihi</label>
      <input type="date" id="startDate">
    </div>
    <button class="primary" id="createPlanBtn">Planı Oluştur</button>
  </div>

  <div id="planScreen" style="display:none;">
    <div class="sub" id="planSub"></div>

    <div class="summary-card" id="summaryCard"></div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-title"><span class="legend-dot" style="background:var(--chipA-text)"></span>Ortalama</div>
        <div class="legend-desc">Kalan hedefi kalan gün sayısına yeniden böler.</div>
      </div>
      <div class="legend-item">
        <div class="legend-title"><span class="legend-dot" style="background:var(--chipB-text)"></span>Ertesi Gün</div>
        <div class="legend-desc">Farkın tamamını yalnızca bir sonraki güne aktarır.</div>
      </div>
    </div>

    <div id="dayList"></div>

    <div class="plan-actions">
      <button class="secondary" id="renameBtn">Planı Yeniden Adlandır</button>
      <button class="secondary danger" id="deleteBtn">Bu Planı Sil</button>
    </div>
  </div>

</div>

<script>
(function () {
  var STORAGE_KEY = 'kalanTakipData_v2';
  var OLD_STORAGE_KEY = 'hedefTakipData_v1';

  function genId() {
    return 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (parsed && parsed.plans) return parsed;
      }
      var oldRaw = localStorage.getItem(OLD_STORAGE_KEY);
      if (oldRaw) {
        var old = JSON.parse(oldRaw);
        if (old && old.goal && old.days) {
          var migratedPlan = {
            id: genId(),
            name: 'Hedef 1',
            goal: old.goal,
            days: old.days,
            startDate: old.startDate,
            entries: old.entries || new Array(old.days).fill(null)
          };
          var migrated = { plans: [migratedPlan], activePlanId: migratedPlan.id };
          saveState(migrated);
          return migrated;
        }
      }
    } catch (e) {}
    return { plans: [], activePlanId: null };
  }

  function saveState(s) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) {}
  }

  var state = loadState();
  if (state.startingBalance === undefined || state.startingBalance === null) state.startingBalance = 0;
  if (!state.withdrawals) state.withdrawals = [];

  var quickCard = document.getElementById('quickCard');
  var quickDateInput = document.getElementById('quickDate');
  var quickAmountInput = document.getElementById('quickAmount');
  var quickSaveBtn = document.getElementById('quickSaveBtn');
  var quickResult = document.getElementById('quickResult');

  var tabBar = document.getElementById('tabBar');
  var balanceCard = document.getElementById('balanceCard');
  var balanceValue = document.getElementById('balanceValue');
  var setStartBtn = document.getElementById('setStartBtn');
  var withdrawBtn = document.getElementById('withdrawBtn');
  var withdrawList = document.getElementById('withdrawList');
  var setupScreen = document.getElementById('setupScreen');
  var planScreen = document.getElementById('planScreen');
  var planNameInput = document.getElementById('planName');
  var goalAmountInput = document.getElementById('goalAmount');
  var goalDaysInput = document.getElementById('goalDays');
  var startDateInput = document.getElementById('startDate');
  var createPlanBtn = document.getElementById('createPlanBtn');
  var renameBtn = document.getElementById('renameBtn');
  var deleteBtn = document.getElementById('deleteBtn');
  var summaryCard = document.getElementById('summaryCard');
  var planSub = document.getElementById('planSub');
  var dayList = document.getElementById('dayList');

  function pad2(n) { return String(n).padStart(2, '0'); }

  function todayISO() {
    var d = new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }

  function addDaysISO(iso, n) {
    var parts = iso.split('-').map(Number);
    var dt = new Date(parts[0], parts[1] - 1, parts[2]);
    dt.setDate(dt.getDate() + n);
    return dt.getFullYear() + '-' + pad2(dt.getMonth() + 1) + '-' + pad2(dt.getDate());
  }

  function daysBetween(iso1, iso2) {
    var p1 = iso1.split('-').map(Number);
    var p2 = iso2.split('-').map(Number);
    var d1 = new Date(p1[0], p1[1] - 1, p1[2]);
    var d2 = new Date(p2[0], p2[1] - 1, p2[2]);
    return Math.round((d2.getTime() - d1.getTime()) / 86400000);
  }

  function formatTRY(num) {
    if (num === null || num === undefined || isNaN(num)) return '—';
    return num.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ₺';
  }

  function formatDateTR(iso) {
    var parts = iso.split('-').map(Number);
    var dt = new Date(parts[0], parts[1] - 1, parts[2]);
    return dt.toLocaleDateString('tr-TR', { day: '2-digit', month: 'short' });
  }

  function getActivePlan() {
    for (var i = 0; i < state.plans.length; i++) {
      if (state.plans[i].id === state.activePlanId) return state.plans[i];
    }
    return null;
  }

  // Bir tarih için, o tarihi kapsayan herhangi bir planda zaten girilmiş
  // bir tutar var mı diye bakar. Varsa onu döner.
  function findExistingValueForDate(dateISO) {
    for (var i = 0; i < state.plans.length; i++) {
      var p = state.plans[i];
      var idx = daysBetween(p.startDate, dateISO);
      if (idx >= 0 && idx < p.days) {
        var v = p.entries[idx];
        if (v !== null && v !== undefined && v !== '') return v;
      }
    }
    return null;
  }

  // Bir tarihe girilen tutarı, o tarihi kapsayan TÜM planlara yazar.
  // Etkilenen planları (ve o plandaki gün index'ini) döner.
  function writeToAllPlans(dateISO, newVal) {
    var affected = [];
    state.plans.forEach(function (p) {
      var idx = daysBetween(p.startDate, dateISO);
      if (idx >= 0 && idx < p.days) {
        p.entries[idx] = newVal;
        affected.push({ plan: p, idx: idx });
      }
    });
    return affected;
  }

  // Bakiye, hedef hesaplamalarından tamamen bağımsızdır. Aynı tarih birden
  // fazla planda görünebileceği için (senkron nedeniyle), toplam kazancı
  // tarihe göre TEKİL olarak toplar; hiçbir plana veya hedefe geri yazmaz.
  function getTotalEarnedAcrossAllDates() {
    var seen = {};
    var total = 0;
    state.plans.forEach(function (p) {
      for (var i = 0; i < p.days; i++) {
        var dateISO = addDaysISO(p.startDate, i);
        if (seen[dateISO]) continue;
        var raw = p.entries[i];
        if (raw !== null && raw !== undefined && raw !== '') {
          var v = parseFloat(raw);
          if (!isNaN(v)) {
            total += v;
            seen[dateISO] = true;
          }
        }
      }
    });
    return total;
  }

  function getTotalWithdrawals() {
    return state.withdrawals.reduce(function (sum, w) { return sum + w.amount; }, 0);
  }

  function getCurrentBalance() {
    return state.startingBalance + getTotalEarnedAcrossAllDates() - getTotalWithdrawals();
  }

  function renderBalance() {
    balanceCard.style.display = state.plans.length > 0 ? 'block' : 'none';
    balanceValue.textContent = formatTRY(getCurrentBalance());

    if (state.withdrawals.length === 0) {
      withdrawList.innerHTML = '';
      return;
    }
    var html = '';
    state.withdrawals.slice().reverse().forEach(function (w) {
      html += '<div class="withdraw-row"><span class="withdraw-date">' + formatDateTR(w.date) + '</span><span class="withdraw-amount">−' + formatTRY(w.amount) + '</span><button class="withdraw-del" data-id="' + w.id + '">×</button></div>';
    });
    withdrawList.innerHTML = html;
    withdrawList.querySelectorAll('.withdraw-del').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        var id = e.target.getAttribute('data-id');
        state.withdrawals = state.withdrawals.filter(function (w) { return w.id !== id; });
        saveState(state);
        renderBalance();
      });
    });
  }

  setStartBtn.addEventListener('click', function () {
    var input = prompt('Başlangıç bakiyesi (₺):', state.startingBalance);
    if (input === null) return;
    var val = parseFloat(input);
    if (isNaN(val) || val < 0) {
      alert('Lütfen geçerli bir tutar girin.');
      return;
    }
    state.startingBalance = val;
    saveState(state);
    renderBalance();
  });

  withdrawBtn.addEventListener('click', function () {
    var input = prompt('Çekilecek tutar (₺):', '');
    if (input === null) return;
    var val = parseFloat(input);
    if (isNaN(val) || val <= 0) {
      alert('Lütfen geçerli bir tutar girin.');
      return;
    }
    state.withdrawals.push({ id: genId(), amount: val, date: todayISO() });
    saveState(state);
    renderBalance();
  });

  quickDateInput.value = todayISO();
  quickAmountInput.value = (function () {
    var existing = findExistingValueForDate(quickDateInput.value);
    return existing !== null ? existing : '';
  })();

  quickDateInput.addEventListener('change', function () {
    var existing = findExistingValueForDate(quickDateInput.value);
    quickAmountInput.value = existing !== null ? existing : '';
    quickResult.innerHTML = '';
  });

  quickSaveBtn.addEventListener('click', function () {
    var dateISO = quickDateInput.value;
    if (!dateISO) {
      alert('Lütfen bir tarih seç.');
      return;
    }
    var val = quickAmountInput.value;
    var newVal = (val === '' ? null : val);
    var affected = writeToAllPlans(dateISO, newVal);
    saveState(state);

    if (affected.length === 0) {
      quickResult.innerHTML = '<div class="quick-result-empty">Bu tarih hiçbir plan aralığına girmiyor.</div>';
    } else {
      var html = '';
      affected.forEach(function (a) {
        var result = computeRows(a.plan);
        var remAfter = Math.max(result.rows[a.idx].remainingAfter, 0);
        html += '<div class="quick-result-row"><span class="qr-name">' + a.plan.name + '</span><span class="qr-val">' + formatTRY(remAfter) + ' kaldı</span></div>';
      });
      quickResult.innerHTML = html;
    }

    render();
  });

  startDateInput.value = todayISO();

  function resetSetupForm() {
    planNameInput.value = '';
    goalAmountInput.value = '';
    goalDaysInput.value = '';
    startDateInput.value = todayISO();
  }

  createPlanBtn.addEventListener('click', function () {
    var goal = parseFloat(goalAmountInput.value);
    var days = parseInt(goalDaysInput.value, 10);
    var startDate = startDateInput.value;
    if (!goal || goal <= 0 || !days || days <= 0 || !startDate) {
      alert('Lütfen geçerli bir hedef tutar, gün sayısı ve başlangıç tarihi girin.');
      return;
    }
    var name = planNameInput.value.trim() || ('Hedef ' + (state.plans.length + 1));
    var entries = new Array(days).fill(null);
    // Diğer planlarda aynı tarih için zaten girilmiş kazanç varsa, yeni planı da onunla başlat.
    for (var i = 0; i < days; i++) {
      var existing = findExistingValueForDate(addDaysISO(startDate, i));
      if (existing !== null) entries[i] = existing;
    }
    var newPlan = { id: genId(), name: name, goal: goal, days: days, startDate: startDate, entries: entries };
    state.plans.push(newPlan);
    state.activePlanId = newPlan.id;
    saveState(state);
    resetSetupForm();
    render();
  });

  renameBtn.addEventListener('click', function () {
    var plan = getActivePlan();
    if (!plan) return;
    var newName = prompt('Yeni plan adı:', plan.name);
    if (newName !== null && newName.trim()) {
      plan.name = newName.trim();
      saveState(state);
      render();
    }
  });

  deleteBtn.addEventListener('click', function () {
    var plan = getActivePlan();
    if (!plan) return;
    if (confirm('"' + plan.name + '" silinecek. Emin misin?')) {
      state.plans = state.plans.filter(function (p) { return p.id !== plan.id; });
      state.activePlanId = state.plans.length > 0 ? state.plans[0].id : null;
      saveState(state);
      render();
    }
  });

  function computeRows(plan) {
    var goal = plan.goal, days = plan.days, startDate = plan.startDate, entries = plan.entries;
    var base = goal / days;
    var remainingGoal = goal;
    var remainingDays = days;
    var carryDiff = 0;
    var cumActual = 0;
    var filledCount = 0;
    var rows = [];

    for (var i = 0; i < days; i++) {
      var rawTarget1 = remainingDays > 0 ? remainingGoal / remainingDays : 0;
      var rawTarget2 = base + carryDiff;

      var raw = entries[i];
      var hasActual = raw !== null && raw !== undefined && raw !== '';
      var actual = hasActual ? parseFloat(raw) : null;

      if (hasActual && !isNaN(actual)) {
        cumActual += actual;
        remainingGoal -= actual;
        remainingDays -= 1;
        filledCount += 1;
      }

      // Ertesi Gün hedefi her zaman ilerler: gerçek giriş varsa onu, yoksa
      // o gün için 0 varsayar. Böylece büyük bir fazla girişten sonra rakam
      // tüm kalan günlerde donup kalmaz; fazlayı kaç gün etkiliyorsa o kadar
      // günde tüketir, sonra normale döner.
      var actualForCascade = (hasActual && !isNaN(actual)) ? actual : 0;
      carryDiff = rawTarget2 - actualForCascade;

      rows.push({
        dayNum: i + 1,
        date: addDaysISO(startDate, i),
        target1: rawTarget1,
        target2: rawTarget2,
        actual: actual,
        hasActual: hasActual,
        remainingAfter: remainingGoal
      });
    }

    return { rows: rows, base: base, cumActual: cumActual, remainingGoalRaw: remainingGoal, filledCount: filledCount };
  }

  function formatTargetDisplay(val) {
    if (val <= 0.005) {
      var note = val < -0.005 ? (formatTRY(Math.abs(val)) + ' fazla') : '';
      return { main: '0,00 ₺', note: note };
    }
    return { main: formatTRY(val), note: '' };
  }

  function renderTabBar() {
    tabBar.innerHTML = '';
    if (state.plans.length === 0) {
      tabBar.style.display = 'none';
      return;
    }
    tabBar.style.display = 'flex';
    state.plans.forEach(function (p) {
      var btn = document.createElement('button');
      btn.className = 'tab' + (p.id === state.activePlanId ? ' active' : '');
      btn.textContent = p.name;
      btn.title = p.name;
      btn.addEventListener('click', function () {
        state.activePlanId = p.id;
        saveState(state);
        render();
      });
      tabBar.appendChild(btn);
    });
    var addBtn = document.createElement('button');
    addBtn.className = 'tab tab-add' + (state.activePlanId === null ? ' active' : '');
    addBtn.textContent = '+';
    addBtn.addEventListener('click', function () {
      state.activePlanId = null;
      saveState(state);
      render();
    });
    tabBar.appendChild(addBtn);
  }

  function render() {
    quickCard.style.display = state.plans.length > 0 ? 'block' : 'none';
    renderBalance();
    renderTabBar();
    var plan = getActivePlan();

    if (!plan) {
      setupScreen.style.display = 'block';
      planScreen.style.display = 'none';
      planNameInput.placeholder = 'Hedef ' + (state.plans.length + 1);
      return;
    }
    setupScreen.style.display = 'none';
    planScreen.style.display = 'block';

    var result = computeRows(plan);
    var rows = result.rows;
    var base = result.base;
    var cumActual = result.cumActual;
    var remainingGoal = Math.max(result.remainingGoalRaw, 0);
    var remainingDaysCount = plan.days - result.filledCount;
    var progressPct = Math.min(100, Math.max(0, (cumActual / plan.goal) * 100));
    var isDone = cumActual >= plan.goal;

    var endDate = addDaysISO(plan.startDate, plan.days - 1);
    planSub.textContent = formatDateTR(plan.startDate) + ' – ' + formatDateTR(endDate) + ' · ' + plan.days + ' gün';

    summaryCard.innerHTML =
      (isDone ? '<div class="done-banner">Hedefe ulaştın</div>' : '') +
      '<div class="summary-rows">' +
        '<div class="summary-row"><span class="summary-label">Hedef</span><span class="summary-value big">' + formatTRY(plan.goal) + '</span></div>' +
        '<div class="summary-row"><span class="summary-label">Günlük Temel Hedef</span><span class="summary-value">' + formatTRY(base) + '</span></div>' +
        '<div class="summary-row"><span class="summary-label">Kazanılan</span><span class="summary-value">' + formatTRY(cumActual) + '</span></div>' +
        '<div class="summary-row"><span class="summary-label">Kalan Hedef</span><span class="summary-value">' + formatTRY(remainingGoal) + '</span></div>' +
        '<div class="summary-row"><span class="summary-label">Kalan Gün</span><span class="summary-value">' + remainingDaysCount + '</span></div>' +
      '</div>' +
      '<div class="progress-wrap"><div class="progress-labels"><span>İlerleme</span><span>' + progressPct.toFixed(0) + '%</span></div><div class="progress-track"><div class="progress-fill" style="width:' + progressPct + '%"></div></div></div>';

    var todayStr = todayISO();
    dayList.innerHTML = '';
    rows.forEach(function (r) {
      var div = document.createElement('div');
      var statusClass = '';
      if (r.hasActual) {
        statusClass = r.actual >= base ? 'met' : 'under';
      }
      if (r.date === todayStr) statusClass += ' today';
      div.className = 'day-row ' + statusClass;

      var t1 = formatTargetDisplay(r.target1);
      var t2 = formatTargetDisplay(r.target2);

      var rem1Html = '';
      var rem2Html = '';
      if (r.hasActual) {
        var rem1 = formatTargetDisplay(r.target1 - r.actual);
        var rem2 = formatTargetDisplay(r.target2 - r.actual);
        rem1Html = '<div class="chip-remaining"><span class="chip-remaining-label">Kalan</span><span class="chip-remaining-value">' + rem1.main + '</span></div>' + (rem1.note ? '<div class="surplus-note">' + rem1.note + '</div>' : '');
        rem2Html = '<div class="chip-remaining"><span class="chip-remaining-label">Kalan</span><span class="chip-remaining-value">' + rem2.main + '</span></div>' + (rem2.note ? '<div class="surplus-note">' + rem2.note + '</div>' : '');
      }

      div.innerHTML =
        '<div class="day-head"><span class="day-num">' + r.dayNum + '. Gün</span><span class="day-date">' + formatDateTR(r.date) + '</span></div>' +
        '<div class="day-input-row"><input type="number" inputmode="decimal" step="0.01" placeholder="Kazanç (₺)" value="' + (r.hasActual ? r.actual : '') + '" data-index="' + (r.dayNum - 1) + '"></div>' +
        '<div class="day-targets">' +
          '<div class="target-chip a"><div class="target-chip-label">Ortalama</div><div class="target-chip-value">' + t1.main + '</div>' + (t1.note ? '<div class="surplus-note">' + t1.note + '</div>' : '') + rem1Html + '</div>' +
          '<div class="target-chip b"><div class="target-chip-label">Ertesi Gün</div><div class="target-chip-value">' + t2.main + '</div>' + (t2.note ? '<div class="surplus-note">' + t2.note + '</div>' : '') + rem2Html + '</div>' +
        '</div>';

      dayList.appendChild(div);
    });

    dayList.querySelectorAll('input[data-index]').forEach(function (inp) {
      inp.addEventListener('change', function (e) {
        var idx = parseInt(e.target.dataset.index, 10);
        var val = e.target.value;
        var newVal = (val === '' ? null : val);
        var targetDate = addDaysISO(plan.startDate, idx);
        writeToAllPlans(targetDate, newVal);
        saveState(state);
        render();
      });
    });
  }

  render();
})();
</script>
</body>
</html>
